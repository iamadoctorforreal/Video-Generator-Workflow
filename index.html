<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro Video Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.25rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scene-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .scene-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            transition: transform 0.2s, background 0.2s;
        }

        .scene-card:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .scene-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        input[type="text"], select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            outline: none;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: var(--danger);
            color: white;
        }

        .btn-add {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px dashed rgba(99, 102, 241, 0.4);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            margin-bottom: 30px;
        }

        .btn-add:hover {
            background: rgba(99, 102, 241, 0.2);
            border-style: solid;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Status Overlay */
        .status-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        .status-text {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .status-sub {
            color: var(--text-dim);
        }

        .result-container {
            display: none;
            margin-top: 30px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        video {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .btn-download {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn-download:hover {
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .glass-container {
                padding: 24px;
            }
            .scene-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Kokoro Studio</h1>
            <p class="subtitle">AI-Powered Cinematic Video Generator</p>
        </header>

        <div class="section-title">
            <span>🎬</span> Story Scenes
        </div>

        <div id="sceneContainer" class="scene-container">
            <!-- Scenes appear here -->
        </div>

        <div class="btn-add" onclick="addScene()">
            + Add New Scene
        </div>

        <div class="section-title">
            <span>⚙️</span> Generation Settings
        </div>

        <div class="settings-grid">
            <div class="setting-item">
                <label>Narrative Voice</label>
                <select id="voice">
                    <option value="af_bella">Bella (Female)</option>
                    <option value="af_sarah">Sarah (Female)</option>
                    <option value="am_adam">Adam (Male)</option>
                    <option value="am_michael">Michael (Male)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Video Orientation</label>
                <select id="orientation">
                    <option value="portrait">Portrait (9:16)</option>
                    <option value="landscape">Landscape (16:9)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Caption Position</label>
                <select id="captionPosition">
                    <option value="bottom">Bottom</option>
                    <option value="center">Center</option>
                    <option value="top">Top</option>
                </select>
            </div>
        </div>

        <div class="checkbox-group mb-5">
            <label class="checkbox-item">
                <input type="checkbox" id="addCaptions" checked> Add Captions
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="addEffects" checked> Visual Effects
            </label>
        </div>

        <button id="generateBtn" class="btn-generate" onclick="startGeneration()">
            Launch Production
        </button>

        <div id="resultArea" class="result-container">
            <h3>✨ Your Masterpiece is Ready</h3>
            <video id="videoPreview" controls></video>
            <a id="downloadLink" class="btn-download" href="#" download>
                📥 Download Video
            </a>
        </div>
    </div>

    <!-- Status Overlay -->
    <div id="statusOverlay" class="status-overlay">
        <div class="loader"></div>
        <div id="statusMsg" class="status-text">Starting generation...</div>
        <div id="statusElapsed" class="status-sub">Elapsed: 0s</div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <p style="color: #64748b; font-size: 0.9rem;">
            Rendering takes about 4-6 minutes for a full story.
        </p>
    </div>

    <script>
        let sceneCount = 0;

        function addScene(text = '', media = 'detect') {
            sceneCount++;
            const container = document.getElementById('sceneContainer');
            const div = document.createElement('div');
            div.className = 'scene-card';
            div.id = `scene-${sceneCount}`;
            div.innerHTML = `
                <div class="scene-header">
                    <label>Scene ${sceneCount}</label>
                    <button class="btn-remove" onclick="removeScene(${sceneCount})">Remove</button>
                </div>
                <textarea placeholder="Tell your story here...">${text}</textarea>
                <div class="scene-controls">
                    <div class="setting-item">
                        <label>Image Source</label>
                        <input type="text" value="${media}" placeholder="Enter filename or 'detect'">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function removeScene(id) {
            const el = document.getElementById(`scene-${id}`);
            if (el) el.remove();
        }

        async function startGeneration() {
            const scenes = [];
            document.querySelectorAll('.scene-card').forEach(card => {
                scenes.push({
                    text: card.querySelector('textarea').value,
                    media_name: card.querySelector('input').value || 'detect'
                });
            });

            if (scenes.length === 0) {
                alert("Please add at least one scene!");
                return;
            }

            const request = {
                scenes: scenes,
                voice: document.getElementById('voice').value,
                orientation: document.getElementById('orientation').value,
                caption_position: document.getElementById('captionPosition').value,
                add_captions: document.getElementById('addCaptions').checked,
                add_effects: document.getElementById('addEffects').checked
            };

            const btn = document.getElementById('generateBtn');
            const overlay = document.getElementById('statusOverlay');
            
            try {
                btn.disabled = true;
                overlay.style.display = 'flex';

                const response = await fetch('/generate-ghibli-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const data = await response.json();
                if (data.job_id) {
                    pollStatus(data.job_id);
                } else {
                    throw new Error("Missing Job ID");
                }
            } catch (err) {
                alert("Error starting generation: " + err.message);
                overlay.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function pollStatus(jobId) {
            const overlay = document.getElementById('statusOverlay');
            const statusMsg = document.getElementById('statusMsg');
            const statusElapsed = document.getElementById('statusElapsed');
            const progressBar = document.getElementById('progressBar');

            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/video-status/${jobId}`);
                    const data = await res.json();

                    statusElapsed.innerText = `Elapsed: ${Math.round(data.elapsed_seconds || 0)}s`;
                    
                    if (data.status === 'success') {
                        clearInterval(interval);
                        showResult(data.filename);
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        alert("Generation Failed: " + data.error);
                        overlay.style.display = 'none';
                        document.getElementById('generateBtn').disabled = false;
                    } else {
                        statusMsg.innerText = data.status.charAt(0).toUpperCase() + data.status.slice(1) + "...";
                        // Simulate progress since we don't have true percentages yet
                        let progress = Math.min(95, (data.elapsed_seconds / 300) * 100);
                        progressBar.style.width = progress + '%';
                    }
                } catch (err) {
                    console.error("Polling error:", err);
                }
            }, 5000);
        }

        function showResult(filename) {
            const overlay = document.getElementById('statusOverlay');
            const resultArea = document.getElementById('resultArea');
            const video = document.getElementById('videoPreview');
            const download = document.getElementById('downloadLink');

            overlay.style.display = 'none';
            resultArea.style.display = 'block';
            
            // Assuming we serve static files from the root or a 'videos' folder
            const videoUrl = `/videos/${filename}`;
            video.src = videoUrl;
            download.href = videoUrl;
            
            document.getElementById('generateBtn').disabled = false;
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        // Add 3 default scenes
        window.onload = () => {
            addScene("Once upon a time, in a floating village above the clouds...", "detect");
            addScene("The people lived in harmony with the giant spirits of the wind.", "detect");
            addScene("But one day, a young explorer found a map to the ancient world below.", "detect");
        };
    </script>
</body>
</html>
